name: Find-it-appAPK

on:
  push:
    branches:
      - main
      - master
      - grok
      - grok-v7
      - mistral-v18
      - mitral-V16
      - mitral-v15
      - Mistral-V17
      - Mistral-V20
      - "feature/**"
      - "fix/**"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create local.properties before Gradle setup
        shell: bash
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          {
            printf 'sdk.dir=%s\n' "$ANDROID_HOME"
            printf 'MAPS_API_KEY=%s\n' "$MAPS_API_KEY"
          } > "$GITHUB_WORKSPACE/local.properties"
          test -f "$GITHUB_WORKSPACE/local.properties"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Require Gradle wrapper
        run: |
          test -f gradlew || { echo "gradlew missing on this branch"; ls -la; exit 1; }
          chmod +x ./gradlew

      - name: Ensure .env for secrets plugin
        run: |
          if [ ! -f .env ] && [ -f .env.example ]; then
            cp .env.example .env
          fi
          touch .env

      - name: Ensure Android debug keystore
        run: |
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          if [ -f debug.keystore.base64 ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ ! -f debug.keystore ]; then
            cp "$HOME/.android/debug.keystore" debug.keystore
          fi

      - name: Unit tests
        continue-on-error: true
        run: ./gradlew testDebugUnitTest --stacktrace --no-configuration-cache

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-configuration-cache

      - name: Compute safe ref name for artifacts
        id: safe_ref
        run: echo "value=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: lidar-metal-detector-debug-${{ steps.safe_ref.outputs.value }}-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build Release APK (unsigned OK)
        continue-on-error: true
        run: ./gradlew assembleRelease --stacktrace --no-configuration-cache

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: lidar-metal-detector-release-${{ steps.safe_ref.outputs.value }}-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 14
